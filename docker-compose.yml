services:
  mysql:
    image: mysql:8.4
    container_name: puutarhakanta-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --skip-name-resolve
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: puutarhakanta2005
      # Optional: set to a specific filename present in ./db-backups
      # Example: DB_RESTORE_FILE=backup.sql
      DB_RESTORE_FILE: ""
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db-backups:/restore:ro
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -prootpassword --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql-data:
